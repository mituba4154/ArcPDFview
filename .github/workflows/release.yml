name: Release Packages

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  package-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained (win-x64)
        shell: pwsh
        run: |
          dotnet publish src/AcroPDF.App/AcroPDF.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:IncludeAllContentForSelfExtract=true `
            -o publish/win-x64

      - name: Install WiX v4
        shell: pwsh
        run: dotnet tool install --global wix --version "4.*"

      - name: Build MSI
        shell: pwsh
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          wix build installer/ArcPDFview.wxs `
            -arch x64 `
            -bindpath PublishDir=publish/win-x64/ `
            -out artifacts/ArcPDFview-win-x64.msi

      - name: Prepare Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item publish/win-x64/AcroPDF.App.exe artifacts/ArcPDFview-win-x64.exe
          Compress-Archive -Path publish/win-x64/* -DestinationPath artifacts/ArcPDFview-win-x64.zip -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ArcPDFview-windows-packages
          path: artifacts/*

  package-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libice-dev libsm-dev libfontconfig1 libglib2.0-dev libnss3 icoutils

      - name: Publish self-contained (linux-x64)
        run: dotnet publish src/AcroPDF.App/AcroPDF.App.csproj -c Release -r linux-x64 --self-contained -o publish/linux-x64

      - name: Prepare Linux icon asset
        run: |
          mkdir -p icon-extract
          icotool -x -w 256 -h 256 icon.ico -o icon-extract || icotool -x icon.ico -o icon-extract
          icon_png="$(find icon-extract -name '*256x256*.png' | sort | head -n 1)"
          if [ -z "$icon_png" ]; then
            # Fallback to the last sorted icon file, which is typically the largest size.
            icon_png="$(find icon-extract -name '*.png' | sort | tail -n 1)"
          fi
          if [ -z "$icon_png" ]; then
            echo "No PNG icon could be extracted from icon.ico" >&2
            exit 1
          fi
          cp "$icon_png" icon-256.png

      - name: Build .deb package
        run: |
          mkdir -p package-root/DEBIAN
          mkdir -p package-root/opt/arcpdfview
          mkdir -p package-root/usr/bin
          mkdir -p package-root/usr/share/applications
          mkdir -p package-root/usr/share/icons/hicolor/256x256/apps
          cp -r publish/linux-x64/* package-root/opt/arcpdfview/
          cp icon-256.png package-root/usr/share/icons/hicolor/256x256/apps/arcpdfview.png
          printf '#!/bin/bash\nset -euo pipefail\nextract_root="${XDG_CACHE_HOME:-$HOME/.cache}/arcpdfview/.net"\nmkdir -p "$extract_root"\nexport DOTNET_BUNDLE_EXTRACT_BASE_DIR="$extract_root"\nexec /opt/arcpdfview/AcroPDF.App "$@"\n' \
            > package-root/usr/bin/arcpdfview
          chmod +x package-root/usr/bin/arcpdfview
          printf '[Desktop Entry]\nName=ArcPDFview\nComment=Lightweight PDF Viewer\nExec=arcpdfview\nIcon=arcpdfview\nType=Application\nCategories=Office;Viewer;\nMimeType=application/pdf;\n' \
            > package-root/usr/share/applications/arcpdfview.desktop
          printf 'Package: arcpdfview\nVersion: %s\nSection: utils\nPriority: optional\nArchitecture: amd64\nMaintainer: ArcPDFview\nDepends: libfontconfig1, libfreetype6, libglib2.0-0, libice6, libnss3, libsm6, libx11-6, libxcursor1, libxext6, libxi6, libxrandr2, libxrender1\nDescription: ArcPDFview lightweight PDF viewer\n' \
            "${GITHUB_REF_NAME#v}" > package-root/DEBIAN/control
          dpkg-deb --build package-root ArcPDFview-linux-x64.deb

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r publish/linux-x64/* AppDir/usr/bin/
          cp icon-256.png AppDir/usr/share/icons/hicolor/256x256/apps/arcpdfview.png
          cp icon-256.png AppDir/arcpdfview.png
          cp icon-256.png AppDir/.DirIcon
          cat > AppDir/arcpdfview.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=ArcPDFview
          Comment=Lightweight PDF Viewer
          Exec=AcroPDF.App
          Icon=arcpdfview
          Categories=Office;Viewer;
          Terminal=false
          EOF

          cp AppDir/arcpdfview.desktop AppDir/usr/share/applications/arcpdfview.desktop
          printf '#!/usr/bin/env bash\nset -euo pipefail\nextract_root="${XDG_CACHE_HOME:-$HOME/.cache}/arcpdfview/.net"\nmkdir -p "$extract_root"\nexport DOTNET_BUNDLE_EXTRACT_BASE_DIR="$extract_root"\nexec "$(dirname "$0")/usr/bin/AcroPDF.App" "$@"\n' \
            > AppDir/AppRun
          chmod +x AppDir/AppRun
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir ArcPDFview-linux-x64.AppImage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ArcPDFview-linux-packages
          path: |
            ArcPDFview-linux-x64.deb
            ArcPDFview-linux-x64.AppImage

  release:
    needs: [package-windows, package-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate release notes
        run: |
          prev_tag="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          if [ -n "$prev_tag" ]; then
            git log --pretty=format:'- %s (%h)' "$prev_tag..$GITHUB_SHA" > RELEASE_NOTES.md
          else
            git log --pretty=format:'- %s (%h)' -n 50 > RELEASE_NOTES.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            release-artifacts/**/ArcPDFview-win-x64.exe
            release-artifacts/**/ArcPDFview-win-x64.msi
            release-artifacts/**/ArcPDFview-win-x64.zip
            release-artifacts/**/ArcPDFview-linux-x64.deb
            release-artifacts/**/ArcPDFview-linux-x64.AppImage
