name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-dev libice-dev libsm-dev libfontconfig1 libglib2.0-dev libnss3

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: timeout 15s xvfb-run -a dotnet run --project src/AcroPDF.App/AcroPDF.App.csproj --no-build --configuration Release || [ $? -eq 124 ]

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $process = Start-Process dotnet -ArgumentList 'run --project src/AcroPDF.App/AcroPDF.App.csproj --no-build --configuration Release' -PassThru
          Start-Sleep -Seconds 15
          if (!$process.HasExited) {
            Stop-Process -Id $process.Id
            exit 0
          }
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }

  package:
    needs: build
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libice-dev libsm-dev libfontconfig1 libglib2.0-dev libnss3

      - name: Publish
        run: dotnet publish src/AcroPDF.App/AcroPDF.App.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:IncludeNativeLibrariesForSelfExtract=true -p:IncludeAllContentForSelfExtract=true -o ./publish/${{ matrix.rid }}

      - name: Verify published binary exists
        shell: bash
        run: |
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            test -f ./publish/${{ matrix.rid }}/AcroPDF.App.exe
          else
            test -f ./publish/${{ matrix.rid }}/AcroPDF.App
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArcPDFview-${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}
