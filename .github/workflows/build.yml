name: Build & Test

# push または PR のたびに自動実行
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Windows と Linux の両方でビルドする
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # リポジトリをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # .NET 8 SDK をセットアップ
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true

      # 依存パッケージを復元
      - name: Restore
        run: dotnet restore

      # ビルド
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # テスト実行
      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal