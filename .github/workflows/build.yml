name: Build & Test
https://github.com/mituba4154/ArcPDFview/pull/15
# push または PR のたびに自動実行
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Windows と Linux の両方でビルド + スモーク実行
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # リポジトリをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # .NET 8 SDK をセットアップ
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 依存パッケージを復元
      - name: Restore
        run: dotnet restore

      # ビルド
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # テスト実行
      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal


      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: timeout 15s xvfb-run -a dotnet run --project src/AcroPDF.App/AcroPDF.App.csproj --no-build --configuration Release || [ $? -eq 124 ]

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $process = Start-Process dotnet -ArgumentList 'run --project src/AcroPDF.App/AcroPDF.App.csproj --no-build --configuration Release' -PassThru
          Start-Sleep -Seconds 15
          if (!$process.HasExited) {
            Stop-Process -Id $process.Id
            exit 0
          }
          if ($process.ExitCode -ne 0) {
            exit $process.ExitCode
          }

