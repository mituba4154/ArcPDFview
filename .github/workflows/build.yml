name: Build & Test

# push または PR のたびに自動実行
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Windows と Linux の両方でビルドする
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # リポジトリをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # .NET 8 SDK をセットアップ
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 依存パッケージを復元
      - name: Restore
        run: dotnet restore

      # ビルド
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # テスト実行
      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
  package:
    needs: build          # Build & Test が通ってから実行
    if: startsWith(github.ref, 'refs/tags/v')  # タグ push 時のみ
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          dotnet publish src/AcroPDF.App/AcroPDF.App.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained \
            -o ./publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArcPDFview-${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}
